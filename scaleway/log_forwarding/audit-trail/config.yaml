receivers:
  scwaudittrail:
    interval: 1m
    max_events_per_request: 100
    access_key: ${env:SCW_ACCESS_KEY}
    secret_key: ${env:SCW_SECRET_KEY}
    organization_id: ${env:SCW_ORGANIZATION_ID}
    region: ${env:SCW_REGION}

processors:
  batch:
    send_batch_max_size: 1000
    send_batch_size: 100
    timeout: 30s
  transform/logs:
    log_statements:
      - context: resource
        statements:
          - set(attributes["datadog.log.source"], "scaleway")
          - set(attributes["service.name"], "scaleway.audit-trail")

exporters:
  datadog:
    idle_conn_timeout: 10s
    api:
      key: ${env:DD_API_KEY}
      site: ${env:DD_SITE}

service:
  pipelines:
    logs:
      receivers: [scwaudittrail]
      processors: [transform/logs, batch]
      exporters: [datadog]
